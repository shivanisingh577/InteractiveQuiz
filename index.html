<!DOCTYPE html>
<html>
<head>
    <title>O Level Interactive Quiz</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-content">
        <h2>O Level Interactive Quiz</h2>
    </div>
</header>

<main class="main-container">

    <form class="form-box" onsubmit="login(event)">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button type="submit">Login</button>

        <p style="text-align:center; margin-top:10px;">
            New user? <a href="register.html">Register</a>
        </p>
    </form>

</main>

<footer class="footer">
    <p>© 2026 O Level Interactive Quiz</p>
</footer>

<script src="script.js"></script>
<script>
window.onload = function() {
    let rememberedUser = localStorage.getItem("currentUser");
    if (rememberedUser) {
        document.getElementById("username").value = rememberedUser;
    }
};
</script>
</body>
</html>
