<!DOCTYPE html>
<html>
<head>
    <title>Quiz Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
    <h1>Interactive Quiz using HTML, CSS and JavaScript</h1>

    <div id="progress"></div>
    
    <div id="question">Question here</div>

    <ul>
        <li>
  <label class="option">
    <input type="radio" name="answer" class="answer" id="a">
    <span id="a_text"></span>
  </label>
</li>

<li>
  <label class="option">
    <input type="radio" name="answer" class="answer" id="b">
    <span id="b_text"></span>
  </label>
</li>

<li>
  <label class="option">
    <input type="radio" name="answer" class="answer" id="c">
    <span id="c_text"></span>
  </label>
</li>

<li>
  <label class="option">
    <input type="radio" name="answer" class="answer" id="d">
    <span id="d_text"></span>
  </label>
</li>

    </ul>

    <button id="submit">Next</button>
</div>

<script src="script.js"></script>
</body>
</html>
