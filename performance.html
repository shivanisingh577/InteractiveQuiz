<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLoginAndShowUser()">

<header class="header">
    <div class="header-content">
        <h2>O Level Interactive Quiz</h2>

<main class="main-container">

    <div id="resultData" class="performance-grid"></div>

    <div class="quiz-buttons">
        <button onclick="location='module.html'" class="secondary-btn">Back to Modules</button>
    </div>

</main>

<footer class="footer">
    <p>© 2026 O Level Interactive Quiz</p>
</footer>

<script src="quizData.js"></script>
<script src="script.js"></script>

</html>
