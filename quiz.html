<!DOCTYPE html>
<html>
<head>
    <title>O Level Interactive Quiz</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-content">
        <h2>O Level Interactive Quiz</h2>
        <div class="user-section">
            <span id="welcome"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="main-container">

    <div class="quiz-box">

        <h3 id="moduleName"></h3>
        <p id="chapter"></p>
        <hr class="divider">

        <p id="progress"></p>

        <h4 id="question"></h4>

        <label class="option">
            <input type="radio" name="answer" value="a">
            <span id="a"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" value="b">
            <span id="b"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" value="c">
            <span id="c"></span>
        </label>

        <label class="option">
            <input type="radio" name="answer" value="d">
            <span id="d"></span>
        </label>

        <div class="quiz-buttons">
    <button id="next" class="primary-btn">Next</button>
    <button id="solutionBtn" class="secondary-btn">View Solution</button>
    <button onclick="exitQuiz()" class="danger-btn">Exit</button>
</div>

        <div id="solutionText" class="solution-box"></div>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 O Level Interactive Quiz</p>
</div>

<script src="quizData.js"></script>
<script src="script.js"></script>
</body>
</html>
