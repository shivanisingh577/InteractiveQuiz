<!DOCTYPE html>
<html>
<head>
    <title>Register - Interactive Quiz</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Register Form -->
<div class="form-container">

    <h2>Interactive Quiz</h2>
     <hr class="divider">
    <h2>Register</h2>

    <form onsubmit="register(event)">

        <!-- Username -->
        <input type="text" id="newUser" placeholder="Create Username" required>

        <!-- Password -->
        <input type="password" id="newPass" placeholder="Create Password" required>

        <!-- Submit -->
        <button type="submit">Register</button>

    </form>

    <p>Already have account? <a href="index.html">Login here</a></p>

</div>

<script src="script.js"></script>

</body>
</html>
