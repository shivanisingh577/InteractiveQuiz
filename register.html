<!DOCTYPE html>
<html>
<head>
    <title>O Level Interactive Quiz</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="header-content">
        <h2>O Level Interactive Quiz</h2>
    </div>
</header>

<main class="main-container">

    <form class="form-box" onsubmit="register(event)">
        <h2>Register</h2>

        <input type="text" id="newUser" placeholder="Username">
        <input type="password" id="newPass" placeholder="Password">

        <button type="submit">Register</button>

        <p style="text-align:center; margin-top:10px;">
            Already have account? <a href="index.html">Login</a>
        </p>
    </form>

</main>

<footer class="footer">
 <p>© 2026 O Level Interactive Quiz</p>
</footer>

<script src="script.js"></script>
</body>
</html>
